<script>
  const fs = require('fs');
  const path = require('path');

  const dir = './'; // folder containing your markdown files

  const mdFiles = fs.readdirSync(dir).filter(file => file.endsWith('.md'));

  for (const file of mdFiles) {
    const filePath = path.join(dir, file);
    const content = fs.readFileSync(filePath, 'utf-8');

    console.log(`--- ${file} ---`);
    console.log(content);
  }

    import Fuse from 'fuse.js'

    const works = [
    { title: "Old Man's War", tags: 'John Scalzi' },
    { title: 'The Lock Artist', tags: 'Steve Hamilton' },
    { title: 'JavaScript Patterns', tags: 'Stoyan Stefanov' }
    ]

    const fuse = new Fuse(works, {
    keys: ['title', 'tags'],
    includeScore: true
    })

    fuse.search('jon')
    // [{ item: { title: "Old Man's War", topic: "John Scalzi" }, refIndex: 0, score: 0.25 }]

    fuse.search('patterns')
    // [{ item: { title: "JavaScript Patterns", ... }, refIndex: 2, score: 0.0 }]
</script>
